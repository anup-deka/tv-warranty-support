name: tv-warranty-support
region: nyc

# ── Backend: FastAPI ──────────────────────────────────────────────────────
services:
  - name: backend
    environment_slug: python
    github:
      repo: your-org/tv-warranty-support
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: uvicorn backend.main:app --host 0.0.0.0 --port 8080
    http_port: 8080
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    health_check:
      http_path: /health
    envs:
      - key: DO_INFERENCE_BASE_URL
        value: https://inference.do-ai.run/v1
      - key: DO_INFERENCE_API_KEY
        type: SECRET
        value: YOUR_DO_INFERENCE_API_KEY
      - key: DO_LLM_MODEL
        value: meta-llama/Meta-Llama-3.1-8B-Instruct
      - key: DO_EMBEDDING_MODEL
        value: text-embedding-ada-002
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${warranty-db.DATABASE_URL}
      - key: DO_SPACES_KEY
        type: SECRET
        value: YOUR_SPACES_ACCESS_KEY
      - key: DO_SPACES_SECRET
        type: SECRET
        value: YOUR_SPACES_SECRET_KEY
      - key: DO_SPACES_REGION
        value: nyc3
      - key: DO_SPACES_BUCKET
        value: tv-warranty-policies
      - key: DO_SPACES_ENDPOINT
        value: https://nyc3.digitaloceanspaces.com
      - key: DO_SPACES_POLICY_FILE
        value: warranty_policy.txt
      - key: BACKEND_CORS_ORIGINS
        value: ${APP_URL}

# ── Frontend: Next.js ─────────────────────────────────────────────────────
  - name: frontend
    environment_slug: node-js
    github:
      repo: your-org/tv-warranty-support
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm ci && npm run build
    run_command: npm run start
    http_port: 3000
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    health_check:
      http_path: /
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}
      - key: NODE_ENV
        value: production

# ── Managed PostgreSQL database ───────────────────────────────────────────
databases:
  - name: warranty-db
    engine: PG
    version: "16"
    production: false   # change to true for prod; uses a dedicated DO DBaaS cluster
    cluster_name: ""    # leave empty to auto-provision a dev DB
